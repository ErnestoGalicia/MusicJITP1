<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music JIT Trainer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .card-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mastery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
            gap: 0.5rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
        }

        .dark input[type="range"]::-webkit-slider-runnable-track {
            background: #27272a;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-100 transition-colors duration-300 overflow-hidden">

    <div id="app" class="flex flex-col h-screen">
        <header class="pt-12 pb-4 px-6 bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center shrink-0">
            <h1 id="view-title" class="text-xl font-bold tracking-tight">Licks y patrones</h1>
            <button onclick="openModal()" class="flex items-center gap-2 px-4 py-2 rounded-full bg-blue-600 text-white hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/20">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">Nuevo</span>
            </button>
        </header>

        <main id="card-container" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32">
            <!-- Cards injected here -->
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-lg border-t border-slate-200 dark:border-zinc-800 safe-area-bottom z-50">
            <div class="flex justify-around items-center h-16">
                <button onclick="switchTab('Licks y patrones')" class="nav-item flex flex-col items-center gap-1 transition-colors" data-tab="Licks y patrones">
                    <i data-lucide="music" class="w-6 h-6"></i>
                    <span class="text-[9px] font-medium uppercase tracking-tighter">Licks</span>
                </button>
                <button onclick="switchTab('Cadenas')" class="nav-item flex flex-col items-center gap-1 transition-colors" data-tab="Cadenas">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                    <span class="text-[9px] font-medium uppercase tracking-tighter">Cadenas</span>
                </button>
                <button onclick="switchTab('Conceptos')" class="nav-item flex flex-col items-center gap-1 transition-colors" data-tab="Conceptos">
                    <i data-lucide="brain" class="w-6 h-6"></i>
                    <span class="text-[9px] font-medium uppercase tracking-tighter">Conceptos</span>
                </button>
                <button onclick="switchTab('Canciones')" class="nav-item flex flex-col items-center gap-1 transition-colors" data-tab="Canciones">
                    <i data-lucide="mic-2" class="w-6 h-6"></i>
                    <span class="text-[9px] font-medium uppercase tracking-tighter">Canciones</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="card-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-lg rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl transform transition-transform translate-y-full" id="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Añadir Flashcard</h2>
                <button onclick="closeModal()" class="text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="card-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Título</label>
                    <input type="text" id="form-title" required class="w-full bg-slate-100 dark:bg-zinc-800 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Descripción (Opcional)</label>
                    <textarea id="form-desc" rows="3" class="w-full bg-slate-100 dark:bg-zinc-800 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">Guardar</button>
            </form>
        </div>
    </div>

    <div id="level-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[110] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="level-modal-title" class="text-xl font-bold text-blue-600">Categoria</h3>
                <button onclick="closeLevelModal()" class="text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="level-checkboxes" class="space-y-4"></div>
            <p class="text-center text-[10px] text-slate-400 mt-8 uppercase tracking-widest font-bold">Progreso Nivel</p>
        </div>
    </div>

    <script>
        const CATEGORIES = [
            { id: 'transferencia', name: 'Transferencia', type: 'levels' },
            { id: 'mejora', name: 'Mejora', type: 'percentage' },
            { id: 'consistencia', name: 'Consistencia', type: 'levels' },
            { id: 'automatismo', name: 'Automatismo', type: 'levels' },
            { id: 'estabilidad', name: 'Estabilidad', type: 'levels' }
        ];

        let currentTab = 'Licks y patrones';
        let activeCardIndex = null;
        let activeLevelId = null;

        let data = JSON.parse(localStorage.getItem('music_jit_v3')) || {
            'Licks y patrones': [], 'Cadenas': [], 'Conceptos': [], 'Canciones': []
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('view-title').innerText = tab;
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('text-blue-600', item.dataset.tab === tab);
                item.classList.toggle('text-slate-400', item.dataset.tab !== tab);
            });
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';
            const tabData = data[currentTab] || [];

            if (tabData.length === 0) {
                container.innerHTML = `<div class="py-20 text-center opacity-30"><i data-lucide="music" class="w-12 h-12 mx-auto mb-2"></i><p>Vacío</p></div>`;
                lucide.createIcons();
                return;
            }

            tabData.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-enter bg-white dark:bg-zinc-900 rounded-2xl p-5 shadow-sm border border-slate-200 dark:border-zinc-800';
                
                cardEl.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="font-bold text-lg leading-tight">${card.title}</h3>
                            <p class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 uppercase mt-1">${card.description || 'Sin descripción'}</p>
                        </div>
                        <button onclick="deleteCard(${index})" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                    <div class="mastery-grid">
                        ${CATEGORIES.map(cat => {
                            const val = card.mastery[cat.id];
                            const isPercentage = cat.type === 'percentage';
                            const isActive = isPercentage ? val > 0 : val.some(v => v);
                            return `
                                <button onclick="openLevelDetail(${index}, '${cat.id}')" 
                                    class="flex flex-col items-center gap-1.5 p-2 rounded-xl border-2 transition-all 
                                    ${isActive ? 'bg-blue-50 border-blue-600 dark:bg-blue-900/20 text-blue-600' : 'border-slate-100 dark:border-zinc-800 text-slate-400'}">
                                    <span class="text-[7px] font-black uppercase tracking-tighter text-center h-4 flex items-center">${cat.name}</span>
                                    <div class="text-[10px] font-bold">${isPercentage ? val + '%' : val.filter(v => v).length + '/3'}</div>
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(cardEl);
            });
            lucide.createIcons();
        }

        function openLevelDetail(cardIndex, catId) {
            activeCardIndex = cardIndex;
            activeLevelId = catId;
            const category = CATEGORIES.find(c => c.id === catId);
            const card = data[currentTab][cardIndex];
            const modal = document.getElementById('level-modal');
            const title = document.getElementById('level-modal-title');
            const container = document.getElementById('level-checkboxes');
            title.innerText = category.name;
            container.innerHTML = '';

            if (category.type === 'levels') {
                [0, 1, 2].forEach(i => {
                    const checked = card.mastery[catId][i];
                    const div = document.createElement('div');
                    div.className = `flex items-center justify-between p-4 rounded-2xl border-2 cursor-pointer transition-all ${checked ? 'bg-blue-600 text-white border-blue-600 shadow-lg' : 'bg-slate-50 dark:bg-zinc-800 text-slate-400 border-transparent'}`;
                    div.onclick = () => toggleSubLevel(i);
                    div.innerHTML = `<span class="font-bold text-sm">Nivel ${i + 1}</span><i data-lucide="${checked ? 'check-circle' : 'circle'}" class="w-5 h-5"></i>`;
                    container.appendChild(div);
                });
            } else {
                const val = card.mastery[catId];
                container.innerHTML = `
                    <div class="text-center mb-4"><span class="text-5xl font-black text-blue-600">${val}%</span></div>
                    <input type="range" min="0" max="100" value="${val}" oninput="updatePercentage(this.value)" class="my-8">
                `;
            }
            modal.classList.remove('hidden'); modal.classList.add('flex');
            lucide.createIcons();
        }

        function toggleSubLevel(levelIndex) {
            data[currentTab][activeCardIndex].mastery[activeLevelId][levelIndex] = !data[currentTab][activeCardIndex].mastery[activeLevelId][levelIndex];
            saveData(); openLevelDetail(activeCardIndex, activeLevelId); renderCards();
        }

        function updatePercentage(val) {
            data[currentTab][activeCardIndex].mastery[activeLevelId] = parseInt(val);
            saveData();
            const display = document.querySelector('#level-checkboxes span.text-5xl');
            if(display) display.innerText = val + '%';
            renderCards();
        }

        function closeLevelModal() { document.getElementById('level-modal').classList.add('hidden'); }
        function openModal() {
            const modal = document.getElementById('card-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => document.getElementById('modal-content').classList.remove('translate-y-full'), 10);
        }
        function closeModal() {
            document.getElementById('modal-content').classList.add('translate-y-full');
            setTimeout(() => { document.getElementById('card-modal').classList.add('hidden'); document.getElementById('card-form').reset(); }, 300);
        }

        document.getElementById('card-form').onsubmit = (e) => {
            e.preventDefault();
            data[currentTab].unshift({
                title: document.getElementById('form-title').value,
                description: document.getElementById('form-desc').value,
                mastery: { transferencia: [false,false,false], mejora: 0, consistencia: [false,false,false], automatismo: [false,false,false], estabilidad: [false,false,false] },
                createdAt: Date.now()
            });
            saveData(); renderCards(); closeModal();
        };

        function deleteCard(index) { if(confirm('¿Eliminar?')) { data[currentTab].splice(index, 1); saveData(); renderCards(); } }
        function saveData() { localStorage.setItem('music_jit_v3', JSON.stringify(data)); }

        // SW Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
            });
        }

        window.onload = () => { lucide.createIcons(); switchTab('Licks y patrones'); };
    </script>
</body>
</html>
