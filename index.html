<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music JIT Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-enter { animation: slideUp 0.2s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hub-arc { fill: none; stroke: #e2e8f0; stroke-width: 4; stroke-linecap: round; transition: all 0.3s ease; }
        .dark .hub-arc { stroke: #27272a; }
        .segment-active { filter: drop-shadow(0 0 5px #3b82f6); stroke: #3b82f6 !important; stroke-width: 5px; }
        
        .prevent-select { -webkit-user-select: none; user-select: none; }
        
        #tools-drawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; }
        .drawer-hidden { transform: translateY(20px) scale(0.95); opacity: 0; pointer-events: none; }
        .drawer-visible { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

        .mastery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; width: 100%; }
        @media (max-width: 400px) { .mastery-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .sublevel-stack { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
        
        #context-menu { position: fixed; z-index: 1000; min-width: 160px; }
        
        .spec-tag { @apply px-2 py-0.5 rounded-md bg-slate-100 dark:bg-zinc-800 text-[9px] font-black uppercase tracking-tighter text-slate-500 dark:text-zinc-400 border border-slate-200 dark:border-zinc-700; }
        
        .level-locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed !important; }

        /* Sidebar Styles */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 300; }
        #sidebar-overlay { transition: opacity 0.3s ease-in-out; z-index: 299; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-100 transition-colors duration-300 overflow-hidden prevent-select">

    <div id="app" class="flex flex-col h-screen relative">
        <!-- Sidebar and Overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 opacity-0 pointer-events-none"></div>
        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-zinc-900 shadow-2xl -translate-x-full">
            <div class="p-6">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-xl font-black text-blue-600">MENÚ</h2>
                    <button onclick="toggleSidebar()"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <nav class="space-y-4">
                    <button onclick="exportToCSV()" class="w-full flex items-center gap-3 p-4 bg-slate-50 dark:bg-zinc-800 rounded-2xl hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors text-left">
                        <i data-lucide="file-spreadsheet" class="w-6 h-6 text-emerald-600"></i>
                        <span class="text-sm font-bold"> Exportar Datos de Investigación (CSV)</span>
                    </button>
                    <!-- Puedes añadir más opciones aquí -->
                </nav>
            </div>
            <div class="absolute bottom-10 left-6 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                JIT Trainer v1.1.5
            </div>
        </div>

        <header class="pt-12 pb-2 px-6 bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 shrink-0">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-zinc-800"><i data-lucide="menu" class="w-6 h-6"></i></button>
                    <h1 id="view-title" class="text-xl font-bold tracking-tight">Licks y patrones</h1>
                </div>
                <div class="flex gap-2">
                    <button onclick="undo()" id="btn-undo" class="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-400 disabled:opacity-30" disabled><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button onclick="redo()" id="btn-redo" class="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-400 disabled:opacity-30" disabled><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                    <button onclick="openFolderModal()" class="p-2 rounded-full bg-slate-100 dark:bg-zinc-800 text-slate-600"><i data-lucide="folder-plus" class="w-5 h-5"></i></button>
                    <button onclick="openCardModal()" class="p-2 rounded-full bg-blue-600 text-white shadow-lg"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
            </div>
            <div id="breadcrumb" class="text-[10px] text-blue-600 font-bold uppercase mt-1 flex items-center gap-1 cursor-pointer hidden" onclick="goBack()">
                <i data-lucide="chevron-left" class="w-3 h-3"></i> <span>Volver</span>
            </div>
        </header>

        <main id="card-container" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-48 relative min-h-[300px]"></main>

        <!-- Tools Hub -->
        <div class="fixed bottom-20 right-4 z-[100] flex flex-col items-end gap-3">
            <div id="tools-drawer" class="drawer-hidden flex items-center gap-3 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-xl border border-slate-200 dark:border-zinc-800 p-2 rounded-2xl shadow-2xl mb-2">
                <button id="drawer-btn-metro" onclick="openMetroDetail()" class="w-12 h-12 flex flex-col items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors text-slate-400">
                    <i data-lucide="music-2" class="w-5 h-5"></i>
                    <span class="text-[8px] font-bold mt-0.5 uppercase">Metro</span>
                </button>
                <div class="w-px h-8 bg-slate-200 dark:bg-zinc-800"></div>
                <button id="drawer-btn-timer" onclick="openTimerDetail()" class="w-12 h-12 flex flex-col items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors text-slate-400">
                    <i data-lucide="timer" class="w-5 h-5"></i>
                    <span class="text-[8px] font-bold mt-0.5 uppercase">Timer</span>
                </button>
                <div class="w-px h-8 bg-slate-200 dark:bg-zinc-800"></div>
                <button id="drawer-btn-dual" onclick="openDualTaskDetail()" class="w-12 h-12 flex flex-col items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors text-slate-400">
                    <i data-lucide="brain-circuit" class="w-5 h-5"></i>
                    <span class="text-[8px] font-bold mt-0.5 uppercase">Dual</span>
                </button>
            </div>

            <button id="hub-toggle" onclick="toggleToolsDrawer()" class="w-16 h-16 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-full shadow-2xl flex items-center justify-center relative active:scale-95 transition-transform">
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full p-0">
                    <path id="seg-metro" class="hub-arc" d="M 50 8 A 42 42 0 0 1 86.37 71" />
                    <path id="seg-dual" class="hub-arc" d="M 86.37 71 A 42 42 0 0 1 13.63 71" />
                    <path id="seg-timer" class="hub-arc" d="M 13.63 71 A 42 42 0 0 1 50 8" />
                </svg>
                <i data-lucide="wrench" class="w-6 h-6 text-slate-500 dark:text-zinc-400"></i>
            </button>
        </div>

        <!-- Context Menu -->
        <div id="context-menu" class="hidden bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-2xl shadow-2xl p-1 overflow-hidden">
            <div id="ctx-item-actions">
                <button onclick="handleCtx('edit')" class="w-full text-left px-4 py-3 text-sm font-bold flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors"><i data-lucide="pencil" class="w-4 h-4"></i> Editar</button>
                <button onclick="handleCtx('copy')" class="w-full text-left px-4 py-3 text-sm font-bold flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors"><i data-lucide="copy" class="w-4 h-4"></i> Copiar</button>
                <button onclick="handleCtx('cut')" class="w-full text-left px-4 py-3 text-sm font-bold flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors text-orange-500"><i data-lucide="scissors" class="w-4 h-4"></i> Cortar</button>
                <div class="h-px bg-slate-100 dark:bg-zinc-800 my-1"></div>
                <button onclick="handleCtx('delete')" class="w-full text-left px-4 py-3 text-sm font-bold flex items-center gap-3 hover:bg-red-50 text-red-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i> Eliminar</button>
            </div>
            <div id="ctx-empty-actions" class="hidden">
                <button onclick="pasteItem(); hideContextMenu();" class="w-full text-left px-4 py-3 text-sm font-bold flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors text-emerald-600"><i data-lucide="clipboard-paste" class="w-4 h-4"></i> Pegar aquí</button>
            </div>
        </div>

        <!-- Overlays -->
        <div id="metro-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[150] hidden items-center justify-center p-6">
            <div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl relative">
                <button onclick="closeMetroDetail()" class="absolute top-6 right-6 text-slate-400"><i data-lucide="x"></i></button>
                <h3 class="text-xl font-bold mb-8 text-blue-600 text-center">Metrónomo</h3>
                <div class="flex justify-center mb-8">
                    <button id="metro-toggle" onclick="toggleMetronome()" class="w-20 h-20 rounded-full bg-slate-100 dark:bg-zinc-800 text-blue-600 flex items-center justify-center">
                        <i data-lucide="play" id="metro-icon" class="w-10 h-10 ml-1"></i>
                    </button>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="changeBPM(-1)" class="p-3 bg-slate-100 dark:bg-zinc-800 rounded-xl font-bold">-</button>
                    <div class="flex-1 text-center">
                        <span id="detail-bpm" class="text-5xl font-black">120</span>
                        <input type="range" id="bpm-slider" min="30" max="300" value="120" oninput="setBPM(this.value)" class="w-full mt-6">
                    </div>
                    <button onclick="changeBPM(1)" class="p-3 bg-slate-100 dark:bg-zinc-800 rounded-xl font-bold">+</button>
                </div>
            </div>
        </div>

        <div id="timer-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[150] hidden items-center justify-center p-6">
            <div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl relative">
                <button onclick="closeTimerDetail()" class="absolute top-6 right-6 text-slate-400"><i data-lucide="x"></i></button>
                <h3 class="text-xl font-bold mb-8 text-blue-600 text-center uppercase tracking-widest text-sm">Temporizador</h3>
                <div class="text-center py-4"><span id="detail-timer-clock" class="text-6xl font-black font-mono">00:00</span></div>
                <div id="alarm-banner" class="hidden bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 p-3 rounded-xl text-center text-sm font-bold animate-pulse mb-4">¡Tiempo!</div>
                <div class="flex flex-col gap-4">
                    <select id="timer-select" class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl font-bold appearance-none text-center">
                        <option value="0.0833">5 seg (Test)</option>
                        <option value="1">1 min</option>
                        <option value="5">5 min</option>
                        <option value="10">10 min</option>
                    </select>
                    <button id="timer-btn" onclick="toggleTimer()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg">Iniciar</button>
                    <button id="stop-alarm-btn" onclick="stopAlarm()" class="hidden w-full py-5 bg-emerald-600 text-white rounded-2xl font-bold text-lg shadow-lg">Entendido</button>
                </div>
            </div>
        </div>

        <div id="dual-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[150] hidden items-center justify-center p-6">
            <div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl relative">
                <button onclick="closeDualTaskDetail()" class="absolute top-6 right-6 text-slate-400"><i data-lucide="x"></i></button>
                <h3 class="text-xl font-bold mb-6 text-indigo-600 text-center flex items-center justify-center gap-2">
                    <i data-lucide="brain-circuit" class="w-5 h-5"></i> Random Beep Test
                </h3>
                
                <div id="dual-setup" class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Duración Sesión</label>
                        <select id="dual-time" class="w-full bg-slate-100 dark:bg-zinc-800 p-3 rounded-xl font-bold mt-1">
                            <option value="0.25">15 segundos (Test)</option>
                            <option value="1">1 minuto</option>
                            <option value="2">2 minutos</option>
                        </select>
                    </div>
                    <div>
                        <div class="flex justify-between items-end">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Máximo de Beeps</label>
                            <span id="dual-beep-val" class="text-xl font-black text-indigo-600">10</span>
                        </div>
                        <input type="range" id="dual-beeps-max" min="1" max="25" value="10" oninput="document.getElementById('dual-beep-val').innerText=this.value" class="w-full mt-2">
                    </div>
                    <button onclick="startDualTask()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-lg">Comenzar</button>
                </div>

                <div id="dual-active" class="hidden text-center space-y-6">
                    <div class="py-4"><span id="dual-clock" class="text-6xl font-black font-mono">00:00</span></div>
                    <p class="text-slate-400 text-sm italic">Escucha con atención...</p>
                    <button onclick="stopDualTask()" class="w-full py-4 border-2 border-slate-100 dark:border-zinc-800 rounded-2xl font-bold text-slate-400">Cancelar</button>
                </div>

                <div id="dual-result" class="hidden text-center space-y-6">
                    <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-2"><i data-lucide="check" class="w-8 h-8"></i></div>
                    <h4 class="text-xl font-bold">Sesión Finalizada</h4>
                    <div id="dual-reveal-box" class="py-6 bg-slate-50 dark:bg-zinc-800 rounded-2xl border-2 border-dashed border-slate-200 dark:border-zinc-700">
                        <button id="reveal-btn" onclick="revealDualAnswer()" class="px-6 py-3 bg-indigo-600 text-white rounded-full font-bold text-sm shadow-md">Revelar Conteo Real</button>
                        <div id="actual-beeps" class="hidden">
                            <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Beeps Tocados</p>
                            <p id="actual-count-val" class="text-6xl font-black text-indigo-600">0</p>
                        </div>
                    </div>
                    <button onclick="resetDualTask()" class="w-full py-4 bg-slate-900 dark:bg-white text-white dark:text-zinc-900 rounded-2xl font-bold">Reiniciar</button>
                </div>
            </div>
        </div>

        <div id="level-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] hidden items-center justify-center p-6">
            <div class="bg-white dark:bg-zinc-900 w-full max-sm:w-full max-w-sm rounded-3xl p-8 shadow-2xl relative">
                <div class="flex justify-between items-center mb-2">
                    <h3 id="level-modal-title" class="text-xl font-bold text-blue-600">Categoria</h3>
                    <button onclick="closeLevelModal()" class="text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <p id="level-modal-subtitle" class="text-[11px] text-slate-400 font-bold uppercase mb-6 tracking-tight"></p>
                <div id="level-msg" class="hidden text-center text-xs font-black text-amber-500 uppercase mb-4 animate-pulse">[Desbloqueado cuando mejora llega al 100%]</div>
                <div id="level-content" class="sublevel-stack no-scrollbar max-h-[60vh] overflow-y-auto"></div>
                <p class="text-center text-[10px] text-slate-400 mt-8 uppercase tracking-widest font-bold">Progreso Nivel</p>
            </div>
        </div>

        <!-- CRUD Modals -->
        <div id="card-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden items-center justify-center p-6">
            <div class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                <h2 id="card-modal-title" class="text-xl font-bold mb-4">Nueva Card</h2>
                <form id="card-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="form-title" placeholder="Título" required class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl outline-none font-bold">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-1">
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">BPM Objetivo</label>
                            <input type="number" id="form-bpm" placeholder="120" required class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl outline-none text-blue-600 font-black">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">Núm. Notas</label>
                            <input type="number" id="form-notes" placeholder="16" required class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl outline-none text-indigo-600 font-black">
                        </div>
                    </div>
                    
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">Subdivisión Principal</label>
                        <input type="text" id="form-subdiv" placeholder="Semicorcheas" required class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl outline-none font-bold">
                    </div>

                    <textarea id="form-desc" placeholder="Descripción / Notas adicionales" class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl outline-none h-24"></textarea>
                    
                    <div class="flex gap-2">
                        <button type="button" onclick="closeCardModal()" class="flex-1 py-3 font-bold text-slate-400">Cancelar</button>
                        <button type="submit" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="folder-modal" onclick="handleFolderOverlayClick(event)" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden items-center justify-center p-6">
            <div id="folder-modal-content" class="bg-white dark:bg-zinc-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
                <h2 id="folder-modal-title" class="text-xl font-bold mb-4">Nueva Carpeta</h2>
                <input type="text" id="folder-name" placeholder="Nombre" class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-xl mb-4 outline-none">
                <div class="flex gap-2">
                    <button onclick="closeFolderModal()" class="flex-1 py-3 font-bold text-slate-400">Cancelar</button>
                    <button id="folder-save-btn" onclick="createFolder()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Crear</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-lg border-t border-slate-200 dark:border-zinc-800 safe-area-bottom z-50 h-16 flex justify-around items-center">
            <button onclick="switchTab('Licks y patrones')" class="nav-item flex flex-col items-center gap-1 transition-all" data-tab="Licks y patrones"><i data-lucide="music" class="w-6 h-6"></i><span class="text-[9px] font-medium uppercase">Licks</span></button>
            <button onclick="switchTab('Cadenas')" class="nav-item flex flex-col items-center gap-1 transition-all" data-tab="Cadenas"><i data-lucide="layers" class="w-6 h-6"></i><span class="text-[9px] font-medium uppercase">Cadenas</span></button>
            <button onclick="switchTab('Conceptos')" class="nav-item flex flex-col items-center gap-1 transition-all" data-tab="Conceptos"><i data-lucide="brain" class="w-6 h-6"></i><span class="text-[9px] font-medium uppercase">Conceptos</span></button>
            <button onclick="switchTab('Canciones')" class="nav-item flex flex-col items-center gap-1 transition-all" data-tab="Canciones"><i data-lucide="mic-2" class="w-6 h-6"></i><span class="text-[9px] font-medium uppercase">Canciones</span></button>
        </nav>
    </div>

    <script>
        const CATEGORIES = [
            { 
                id: 'transferencia', 
                name: 'Transferencia', 
                type: 'levels', 
                count: 5,
                labels: ['Análisis técnico', 'Análisis teórico', 'Análisis emocional', 'Se derivaron conceptos', 'Encadenado con más vocabulario'] 
            },
            { 
                id: 'mejora', 
                name: 'Mejora', 
                type: 'percentage', 
                subtitle: 'Porcentaje de velocidad actual' 
            },
            { 
                id: 'consistencia', 
                name: 'Consistencia', 
                type: 'levels', 
                count: 3, 
                subtitle: '5 intentos a velocidad sin errores',
                labels: ['Misma sesión (corto plazo)', 'Día siguiente (mediano plazo)', 'Semana siguiente (largo plazo)'] 
            },
            { 
                id: 'automatismo', 
                name: 'Automatismo', 
                type: 'levels', 
                count: 3, 
                subtitle: 'Cinco intentos a velocidad con tarea dual',
                labels: ['Misma sesión (corto plazo)', 'Día siguiente (mediano plazo)', 'Semana siguiente (largo plazo)'] 
            }
        ];

        let currentTab = 'Licks y patrones';
        let currentPath = [];
        let activeCardId = null;
        let activeCategoryId = null;
        
        let history = [];
        let historyIndex = -1;
        const MAX_HISTORY = 20;

        let data = JSON.parse(localStorage.getItem('music_jit_v11')) || {
            'Licks y patrones': { items: [] },
            'Cadenas': { items: [] },
            'Conceptos': { items: [] },
            'Canciones': { items: [] }
        };

        function pushHistory() {
            if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
            history.push(JSON.stringify(data));
            if (history.length > MAX_HISTORY) history.shift();
            else historyIndex++;
            updateHistoryButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                data = JSON.parse(history[historyIndex]);
                currentPath = [];
                save(false); render();
            }
        }

        function redo() {

            if (!item && (action === 'copy' || action === 'cut' || action === 'delete' || action === 'edit')) {
                hideContextMenu();
                return;
            }
            switch(action) {
                case 'delete': deleteItem(contextTargetId); break;
                case 'copy': clipboard = { item: JSON.parse(JSON.stringify(item)), mode: 'copy' }; break;
                case 'cut': clipboard = { item: JSON.parse(JSON.stringify(item)), mode: 'cut' }; break;

        function pasteItem() {
            if (!clipboard) return;
            const folder = getCurrentFolder();
            const newItem = JSON.parse(JSON.stringify(clipboard.item));
            if (clipboard.mode === 'cut') {
                Object.keys(data).forEach(tab => {
                    const findAndRemove = (container) => {
                        const idx = container.items.findIndex(i => i.id === clipboard.item.id);
                        if (idx !== -1) { container.items.splice(idx, 1); return true; }
                        return container.items.some(i => i.type === 'folder' && findAndRemove(i));
                    };
                    findAndRemove(data[tab]);
                });
                clipboard = null;
            } else {
                newItem.id = (newItem.type === 'card' ? 'card-' : 'fld-') + Date.now();

        let dualTimerId = null, scheduledBeeps = [], actualBeepsPlayed = 0;
        function startDualTask() {
            initAudio(); const durationSec = Math.round(parseFloat(document.getElementById('dual-time').value) * 60); const maxBeeps = parseInt(document.getElementById('dual-beeps-max').value); const countToPlay = Math.floor(Math.random() * maxBeeps) + 1; actualBeepsPlayed = 0; scheduledBeeps = [];
            for(let i=0; i<countToPlay; i++) { scheduledBeeps.push(Math.random() * (durationSec - 2) + 1); } scheduledBeeps.sort((a,b) => b-a);
            document.getElementById('dual-setup').classList.add('hidden'); document.getElementById('dual-active').classList.remove('hidden'); const startTime = Date.now();

                    } else if (item.type === 'card') {
                        const m = item.mastery || {};
                        const trans = Array.isArray(m.transferencia) ? m.transferencia : [false,false,false,false,false];
                        const cons = Array.isArray(m.consistencia) ? m.consistencia : [false,false,false];
                        const auto = Array.isArray(m.automatismo) ? m.automatismo : [false,false,false];

                        const row = [
                            folderPath || "Raíz",
                            item.title,
                            trans[0] ? "COMPLETADO" : "PENDIENTE",
                            trans[1] ? "COMPLETADO" : "PENDIENTE",
                            trans[2] ? "COMPLETADO" : "PENDIENTE",
                            trans[3] ? "COMPLETADO" : "PENDIENTE",
                            trans[4] ? "COMPLETADO" : "PENDIENTE",
                            (m.mejora || 0) + "%",
                            cons[0] ? "COMPLETADO" : "PENDIENTE",
                            cons[1] ? "COMPLETADO" : "PENDIENTE",
                            cons[2] ? "COMPLETADO" : "PENDIENTE",
                            auto[0] ? "COMPLETADO" : "PENDIENTE",
                            auto[1] ? "COMPLETADO" : "PENDIENTE",
                            auto[2] ? "COMPLETADO" : "PENDIENTE",
                            "N/A" // Marcador para tiempo si se implementa cronómetro por tarjeta
                        ];
                        rows.push(row);
                    }
                });
            }

            // Procesar todas las pestañas principales
            Object.keys(data).forEach(tab => {
                processFolder(data[tab], tab);
            });

            // Construir el string CSV
            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.map(val => `"${val}"`).join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "datos_investigacion_jit.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            toggleSidebar(); // Cerrar menú tras exportar
        }

        window.addEventListener('click', () => hideContextMenu());
        window.onload = () => { pushHistory(); lucide.createIcons(); switchTab('Licks y patrones'); };
    </script>
</body>
</html>
